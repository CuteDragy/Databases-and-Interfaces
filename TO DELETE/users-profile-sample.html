<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard | Welcome back</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-width: 260px;
            --primary: #6366f1;
            --bg-body: #f8fafc;
            --border: #e2e8f0;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
        }

        /* --- Sidebar --- */
        nav {
            width: var(--sidebar-width);
            height: 100vh;
            background: white;
            border-right: 1px solid var(--border);
            position: fixed;
            padding: 24px;
            display: flex;
            flex-direction: column;
        }

        .logo { font-weight: 700; font-size: 1.5rem; color: var(--primary); margin-bottom: 40px; }

        .nav-links { list-style: none; flex-grow: 1; }
        .nav-links li { margin-bottom: 8px; }
        .nav-links a {
            text-decoration: none;
            color: var(--text-muted);
            padding: 12px 16px;
            display: block;
            border-radius: 8px;
            font-weight: 500;
            transition: 0.2s;
        }
        .nav-links a.active, .nav-links a:hover {
            background: #eef2ff;
            color: var(--primary);
        }

        /* --- Main Content Area --- */
        main {
            margin-left: var(--sidebar-width);
            width: calc(100% - var(--sidebar-width));
            padding: 40px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .user-pill {
            display: flex;
            align-items: center;
            background: white;
            padding: 6px 16px;
            border-radius: 30px;
            border: 1px solid var(--border);
        }

        .user-pill img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            margin-right: 10px;
        }

        /* --- Dashboard Grid --- */
        .grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
        }

        .card {
            background: white;
            padding: 24px;
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .card h3 { margin-bottom: 20px; font-size: 1.1rem; }

        /* Form styling for Profile Settings */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px; }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            outline: none;
        }

        .save-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 10px;
        }

        .activity-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f1f5f9;
        }

        .activity-item:last-child { border: 0; }

        @media (max-width: 900px) {
            .grid { grid-template-columns: 1fr; }
            nav { width: 80px; padding: 20px 10px; }
            .nav-text, .logo span { display: none; }
            main { margin-left: 80px; width: calc(100% - 80px); }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">P<span>rofile</span></div>
        <ul class="nav-links">
            <li><a href="#" class="active"><span class="nav-text">Dashboard</span></a></li>
            <li><a href="#"><span class="nav-text">Settings</span></a></li>
            <li><a href="#"><span class="nav-text">Projects</span></a></li>
            <li><a href="#"><span class="nav-text">Notifications</span></a></li>
        </ul>
        <div class="nav-links">
            <a href="#" style="color: #ef4444;">Logout</a>
        </div>
    </nav>

    <main>
        <header>
            <h1>Welcome back, Alex!</h1>
            <div class="user-pill">
                <img src="https://ui-avatars.com/api/?name=Alex+Rivera&background=6366f1&color=fff" alt="Avatar">
                <span style="font-weight: 500; font-size: 0.9rem;">Alex Rivera</span>
            </div>
        </header>

        <div class="grid">
            <div class="card">
                <h3>Profile Settings</h3>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" value="Alex Rivera">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" value="alex.rivera@example.com">
                </div>
                <div class="form-group">
                    <label>Bio</label>
                    <input type="text" value="UX Designer based in Madrid.">
                </div>
                <button class="save-btn">Update Profile</button>
            </div>

            <div class="card">
                <h3>Recent Activity</h3>
                <div class="activity-item">
                    <div style="font-size: 0.85rem;">
                        <strong>Updated Portfolio</strong><br>
                        <span style="color: var(--text-muted);">2 hours ago</span>
                    </div>
                </div>
                <div class="activity-item">
                    <div style="font-size: 0.85rem;">
                        <strong>Changed Password</strong><br>
                        <span style="color: var(--text-muted);">Yesterday</span>
                    </div>
                </div>
                <div class="activity-item">
                    <div style="font-size: 0.85rem;">
                        <strong>Logged in from Chrome</strong><br>
                        <span style="color: var(--text-muted);">March 18, 2026</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
