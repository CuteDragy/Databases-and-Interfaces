<!DOCTYPE html>
<html lang="en">

<head>
    <title>Product Details</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .content-header {
            font-size: 1rem;
            padding: 5px;
            background: #10263b;
            display: flex;
            color: white;
        }

        .sidebar {
            width: 300px;
            height: 100%;
            position: fixed;
            top: 0;
            left: -300px;
            background-color: rgb(255, 255, 255);
            background-size: cover;
            background-position: center;
            background-repeat: repeat;
            background-blend-mode: lighten;
            padding-top: 1vw;
            font-family: "Arial", sans-serif;
            overflow-x: hidden;
            transition: 0.5s;
            z-index: 1100;
        }

        .sidebar.show {
            left: 0;
        }

        .sidebar a {
            padding: 20px 15px;
            font-size: 20px;
            transition: 0.5s;
            position: sticky;
            display: inline-block;
            text-decoration: none;
            overflow: visible;
            color: #000000;
            display: block;
        }

        .sidebar a:hover {
            background: #10263b;
            color: white;
        }

        .sidebar .close-btn {
            line-height: 50px;
            font-size: 50px;
            top: 0;
            right: 0;
            background: rgb(255, 255, 255);
            border: none;
            cursor: pointer;
            position: absolute;
        }

        .sidebar .close-btn:hover {
            background: #10263b;
            overflow: hidden;
            color: white;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            visibility: hidden;
            opacity: 0;
            transition: 0.3s ease;
            z-index: 1000;
        }

        .overlay.show {
            visibility: visible;
            opacity: 1;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
        }

        .input-bar {
            width: 100%;
            height: 100px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
            resize: none;
        }

        .submit-button {
            background: linear-gradient(135deg, #D8BFAA, #C8A97E);
            color: white;
            font-size: 1.0rem;
            font-weight: 600;
            padding: 0.75rem 2rem;
            border: none;
            border-radius: 50px;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .submit-button:hover {
            background: linear-gradient(135deg, #C8A97E, #B89C77);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.2);
            transform: translateY(-3px);
        }

        .submit-button:active {
            transform: translateY(-1px);
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);
        }

        .input-bar:focus {
            border-color: #C8A97E;
            box-shadow: 0 0 0 3px #EFE5D1;
            outline: none;
        }

        #main {
            background-color: white;
        }

        .menu-btn {
            font-size: 50px;
            padding-top: 0px;
            padding-left: 1%;
            padding-bottom: 6px;
            cursor: pointer;
            background: none;
            border: none;
            color: white;
        }
    </style>
</head>

<body>
    <div class="sidebar" id="mySidebar">
        <div>
            <p
                style="margin-top: 10px; margin-left: 13px; margin-bottom: 3px; line-height: 1; box-sizing: content-box; font-weight: bold; font-size: 27px; font-style: oblique;">
                Hello, Guest</p>
        </div>
        <button class="close-btn" onclick="toggleSidebar()">&times;</button>
        <div
            style="margin-top: 35px; font-family:Arial, sans-serif;">
            <p style="margin-left: 13px; margin-bottom: 3px; line-height: 1; box-sizing: content-box; font-weight: bold; font-size: 26px;">Menu</p>
            <a href="Homepage.html">Home</a>
            <a href="Buy Giftcards.html">Buy Giftcards</a>
            <a href="Product Details Page.html">Product Details</a>
            <a href="Listing Page.html">Products List</a>
            <a href="Payment Page2.html">Payment</a><br><br><br>
            <p style="margin-left: 13px; margin-bottom: 3px; line-height: 1; box-sizing: content-box; font-weight: bold; font-size: 26px;">Support</p>
            <a href="Account.html">Account</a>
            <a href="FAQ.html">FAQ</a>
            <a href="contactpage.html">Contact Us</a>
            <a style="margin-bottom: 100px" href="Sign In.html">Sign in</a>
        </div>
    </div>
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
    <div id="main">
        <div class="content-header">
            <button class="menu-btn" onclick="toggleSidebar()">&#9776;</button>
        </div>
            <script>
                function toggleSidebar() {
                    const sidebar = document.getElementById("mySidebar");
                    const overlay = document.getElementById("overlay");

                    // Toggle the 'show' class
                    sidebar.classList.toggle("show");
                    overlay.classList.toggle("show");
                }
            </script>
</body>
</html>
